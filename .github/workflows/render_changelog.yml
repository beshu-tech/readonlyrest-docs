name: Validate changelog YAML

# Schema + filename/version-match validation for changelog/*.yaml (the single source of truth).
# The legacy changelog.md mirror this workflow used to render is RETIRED (#94): changelog.md is now
# the ror-api-rendered detailed changelog, committed by ror-api — not regenerated here. Validation
# steps are kept (they run on both push and PR); the render + commit steps are gone.

on:
  push:
    branches: [master]
    paths:
      - "changelog/**.yaml"
      - ".github/workflows/render_changelog.yml"
      - ".github/schemas/changelog-entry.schema.json"
  pull_request:
    paths:
      - "changelog/**.yaml"
      - ".github/workflows/render_changelog.yml"
      - ".github/schemas/changelog-entry.schema.json"

permissions:
  contents: read

jobs:
  # Job id kept as `validate-and-render` so the status-check context name is unchanged for any
  # branch protection requiring it (see changelog_form.yml auto-merge caveat). Only the render
  # half is gone; the id is a stable check name, not a description.
  validate-and-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML schema (ajv)
        run: |
          npm install --no-save ajv@8 ajv-cli@5 ajv-formats@2
          for f in changelog/*.yaml; do
            [ -f "$f" ] || continue
            npx ajv-cli validate \
              -s .github/schemas/changelog-entry.schema.json \
              -d "$f" \
              -c ajv-formats || exit 1
          done

      - name: Build releases JSON (with filename)
        run: |
          echo '[' > all.json
          first=true
          for f in changelog/*.yaml; do
            [ -f "$f" ] || continue
            $first || echo ',' >> all.json
            first=false
            fname=$(basename "$f" .yaml)
            yq -o json ". + {\"_filename\": \"$fname\"}" "$f" >> all.json
          done
          echo ']' >> all.json

      - name: Validate filename matches inner version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const releases = JSON.parse(fs.readFileSync('all.json', 'utf8'))
            const mismatches = releases.filter(r => r._filename !== r.version)
            if (mismatches.length) {
              for (const r of mismatches) {
                core.error(`filename ${r._filename}.yaml does not match inner version: ${r.version}`)
              }
              core.setFailed(`${mismatches.length} file(s) with filename/version mismatch — rename file or fix version field`)
            }
